<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="markGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="520" height="160" fill="#0d1117"/>

  <!-- Icon mark -->
  <g transform="translate(20, 24)">
    <rect x="0" y="0" width="112" height="112" rx="22" fill="url(#markGradDark)"/>
    <path d="M34,30 L22,56 L34,82"
          fill="none" stroke="white" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78,30 L90,56 L78,82"
          fill="none" stroke="white" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="44" y1="56" x2="64" y2="56"
          stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <polyline points="56,47 68,56 56,65"
              fill="none" stroke="white" stroke-width="4.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "codespacegen" -->
  <text x="152" y="90"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="46"
        font-weight="700"
        letter-spacing="-1.5">
    <tspan fill="#f0f6fc">codespace</tspan><tspan fill="#60a5fa">gen</tspan>
  </text>

  <!-- Tagline -->
  <circle cx="162" cy="114" r="3.5" fill="#60a5fa"/>
  <text x="174" y="120"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="400"
        fill="#8b949e"
        letter-spacing="0.3">devcontainer file generator</text>
</svg>
