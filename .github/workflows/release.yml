name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -eu
          mkdir -p dist tmp
          if [ "${{ matrix.archive }}" = "exe" ]; then
            out="dist/codespacegen_${GOOS}_${GOARCH}.exe"
            go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/codespacegen
          else
            bin="tmp/codespacegen"
            go build -trimpath -ldflags="-s -w" -o "$bin" ./cmd/codespacegen
            tar -C tmp -czf "dist/codespacegen_${GOOS}_${GOARCH}.tar.gz" codespacegen
            rm -f "$bin"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten files and generate checksums
        run: |
          set -eu
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          (cd release && sha256sum * > checksums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
